<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Pixel art bishop: 10x10 block grid, 8 units per block, rects only  -->
  <!-- Tall pointed mitre tapering 2px → 8px, horizontal band + accent gem -->

  <!-- Row 0: finial top (2px, cols 4-5) -->
  <rect x="32" y="0"  width="16" height="8" fill="{stroke}"/>
  <!-- Row 1: finial body (4px, cols 3-6) -->
  <rect x="24" y="8"  width="8"  height="8" fill="{stroke}"/>
  <rect x="32" y="8"  width="8"  height="8" fill="{fill_hi}"/>
  <rect x="40" y="8"  width="8"  height="8" fill="{fill_lo}"/>
  <rect x="48" y="8"  width="8"  height="8" fill="{stroke}"/>
  <!-- Row 2: mitre narrow (4px, cols 3-6) -->
  <rect x="24" y="16" width="8"  height="8" fill="{stroke}"/>
  <rect x="32" y="16" width="8"  height="8" fill="{fill_hi}"/>
  <rect x="40" y="16" width="8"  height="8" fill="{fill_lo}"/>
  <rect x="48" y="16" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 3: mitre expanding (6px, cols 2-7) -->
  <rect x="16" y="24" width="8"  height="8" fill="{stroke}"/>
  <rect x="24" y="24" width="16" height="8" fill="{fill_hi}"/>
  <rect x="40" y="24" width="16" height="8" fill="{fill_lo}"/>
  <rect x="56" y="24" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 4: mitre widest (8px, cols 1-8) -->
  <rect x="8"  y="32" width="8"  height="8" fill="{stroke}"/>
  <rect x="16" y="32" width="24" height="8" fill="{fill_hi}"/>
  <rect x="40" y="32" width="24" height="8" fill="{fill_lo}"/>
  <rect x="64" y="32" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 5: horizontal band with accent gem (stroke only at edges, fill_lo sides) -->
  <rect x="8"  y="40" width="8"  height="8" fill="{stroke}"/>
  <rect x="16" y="40" width="16" height="8" fill="{fill_lo}"/>
  <rect x="32" y="40" width="8"  height="8" fill="{accent}"/>
  <rect x="40" y="40" width="16" height="8" fill="{fill_lo}"/>
  <rect x="56" y="40" width="8"  height="8" fill="{fill_lo}"/>
  <rect x="64" y="40" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 6: body below band (6px, cols 2-7) -->
  <rect x="16" y="48" width="8"  height="8" fill="{stroke}"/>
  <rect x="24" y="48" width="16" height="8" fill="{fill_hi}"/>
  <rect x="40" y="48" width="16" height="8" fill="{fill_lo}"/>
  <rect x="56" y="48" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 7: collar (6px, cols 2-7) -->
  <rect x="16" y="56" width="48" height="8" fill="{stroke}"/>
  <!-- Row 8: base -->
  <rect x="0"  y="64" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="64" width="16" height="8" fill="{fill_hi}"/>
  <rect x="24" y="64" width="24" height="8" fill="{fill}"/>
  <rect x="48" y="64" width="24" height="8" fill="{fill_lo}"/>
  <rect x="72" y="64" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 9: base bottom -->
  <rect x="0"  y="72" width="80" height="8" fill="{stroke}"/>
</svg>
