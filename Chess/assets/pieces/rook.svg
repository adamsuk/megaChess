<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!--
    Pixel art rook / castle tower: three merlons with bevel, tower body with left-face
    highlight and right-face shadow, collar, raised base with drop shadow.
  -->
  <!-- Drop shadow -->
  <rect x="8"  y="70" width="68" height="6" rx="1" fill="{fill_lo}"/>
  <!-- Base platform -->
  <rect x="4"  y="60" width="72" height="13" rx="1" fill="{fill}" stroke="{stroke}" stroke-width="2"/>
  <!-- Base top highlight -->
  <rect x="5"  y="61" width="70" height="3" fill="{fill_hi}"/>
  <!-- Base right shadow -->
  <rect x="72" y="61" width="3"  height="11" fill="{fill_lo}"/>
  <!-- Collar -->
  <rect x="6"  y="53" width="68" height="8" rx="1" fill="{fill}" stroke="{stroke}" stroke-width="2"/>
  <!-- Collar top highlight -->
  <rect x="7"  y="54" width="66" height="2" fill="{fill_hi}"/>
  <!-- Tower body -->
  <rect x="8"  y="26" width="64" height="28" fill="{fill}" stroke="{stroke}" stroke-width="2"/>
  <!-- Tower left-face highlight -->
  <rect x="9"  y="27" width="10" height="26" fill="{fill_hi}"/>
  <!-- Tower right-face shadow -->
  <rect x="67" y="27" width="4"  height="26" fill="{fill_lo}"/>
  <!-- Left merlon -->
  <rect x="8"  y="6"  width="18" height="22" rx="1" fill="{fill}" stroke="{stroke}" stroke-width="2"/>
  <!-- Left merlon left highlight + top highlight -->
  <rect x="9"  y="7"  width="6"  height="20" fill="{fill_hi}"/>
  <rect x="8"  y="6"  width="18" height="2"  fill="{fill_hi}"/>
  <!-- Centre merlon -->
  <rect x="31" y="6"  width="18" height="22" rx="1" fill="{fill}" stroke="{stroke}" stroke-width="2"/>
  <!-- Centre merlon left highlight + top highlight -->
  <rect x="32" y="7"  width="6"  height="20" fill="{fill_hi}"/>
  <rect x="31" y="6"  width="18" height="2"  fill="{fill_hi}"/>
  <!-- Right merlon -->
  <rect x="54" y="6"  width="18" height="22" rx="1" fill="{fill}" stroke="{stroke}" stroke-width="2"/>
  <!-- Right merlon left highlight + top highlight -->
  <rect x="55" y="7"  width="6"  height="20" fill="{fill_hi}"/>
  <rect x="54" y="6"  width="18" height="2"  fill="{fill_hi}"/>
</svg>
