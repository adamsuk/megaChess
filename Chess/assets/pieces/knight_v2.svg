<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- V2: Right Profile — ear at left, snout extends right, mouth gap at col 9 -->

  <!-- Row 0: ear tip cols 2-3 -->
  <rect x="16" y="0"  width="8"  height="8" fill="{stroke}"/>
  <rect x="24" y="0"  width="8"  height="8" fill="{fill_hi}"/>
  <!-- Row 1: ear base cols 2-5 -->
  <rect x="16" y="8"  width="8"  height="8" fill="{stroke}"/>
  <rect x="24" y="8"  width="8"  height="8" fill="{fill_hi}"/>
  <rect x="32" y="8"  width="8"  height="8" fill="{fill_hi}"/>
  <rect x="40" y="8"  width="8"  height="8" fill="{stroke}"/>
  <!-- Row 2: face cols 2-7, accent eye at col 4 -->
  <rect x="16" y="16" width="8"  height="8" fill="{stroke}"/>
  <rect x="24" y="16" width="8"  height="8" fill="{fill_lo}"/>
  <rect x="32" y="16" width="8"  height="8" fill="{accent}"/>
  <rect x="40" y="16" width="8"  height="8" fill="{fill_hi}"/>
  <rect x="48" y="16" width="8"  height="8" fill="{fill_hi}"/>
  <rect x="56" y="16" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 3: wide face cols 2-8 -->
  <rect x="16" y="24" width="8"  height="8" fill="{stroke}"/>
  <rect x="24" y="24" width="16" height="8" fill="{fill_lo}"/>
  <rect x="40" y="24" width="8"  height="8" fill="{fill}"/>
  <rect x="48" y="24" width="16" height="8" fill="{fill_hi}"/>
  <rect x="64" y="24" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 4: snout extends right cols 4-9 -->
  <rect x="32" y="32" width="8"  height="8" fill="{stroke}"/>
  <rect x="40" y="32" width="8"  height="8" fill="{fill_lo}"/>
  <rect x="48" y="32" width="16" height="8" fill="{fill}"/>
  <rect x="64" y="32" width="8"  height="8" fill="{fill_hi}"/>
  <rect x="72" y="32" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 5: jaw cols 5-8, col 9 open = mouth gap -->
  <rect x="40" y="40" width="8"  height="8" fill="{stroke}"/>
  <rect x="48" y="40" width="8"  height="8" fill="{fill_lo}"/>
  <rect x="56" y="40" width="8"  height="8" fill="{fill_hi}"/>
  <rect x="64" y="40" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 6: neck cols 4-7 -->
  <rect x="32" y="48" width="8"  height="8" fill="{stroke}"/>
  <rect x="40" y="48" width="8"  height="8" fill="{fill_lo}"/>
  <rect x="48" y="48" width="8"  height="8" fill="{fill_hi}"/>
  <rect x="56" y="48" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 7: collar -->
  <rect x="16" y="56" width="48" height="8" fill="{stroke}"/>
  <!-- Row 8: base -->
  <rect x="0"  y="64" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="64" width="16" height="8" fill="{fill_hi}"/>
  <rect x="24" y="64" width="24" height="8" fill="{fill}"/>
  <rect x="48" y="64" width="24" height="8" fill="{fill_lo}"/>
  <rect x="72" y="64" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 9: base bottom -->
  <rect x="0"  y="72" width="80" height="8" fill="{stroke}"/>
</svg>
