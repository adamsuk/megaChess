<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Pixel art queen: 10x10 block grid, 8 units per block, rects only -->
  <!-- Crown: 3 isolated spikes (col 1, cols 4-5, col 8) rising from solid band -->

  <!-- Row 0: three spikes (col 1, cols 4-5, col 8) -->
  <rect x="8"  y="0"  width="8"  height="8" fill="{stroke}"/>
  <rect x="32" y="0"  width="16" height="8" fill="{stroke}"/>
  <rect x="64" y="0"  width="8"  height="8" fill="{stroke}"/>
  <!-- Row 1: three spikes continued -->
  <rect x="8"  y="8"  width="8"  height="8" fill="{stroke}"/>
  <rect x="32" y="8"  width="16" height="8" fill="{stroke}"/>
  <rect x="64" y="8"  width="8"  height="8" fill="{stroke}"/>
  <!-- Row 2: crown band — {stroke} at spike bases, {fill_lo} gaps between orbs -->
  <rect x="0"  y="16" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="16" width="8"  height="8" fill="{fill_lo}"/>
  <rect x="16" y="16" width="8"  height="8" fill="{stroke}"/>
  <rect x="24" y="16" width="8"  height="8" fill="{fill_lo}"/>
  <rect x="32" y="16" width="8"  height="8" fill="{stroke}"/>
  <rect x="40" y="16" width="8"  height="8" fill="{fill_lo}"/>
  <rect x="48" y="16" width="8"  height="8" fill="{stroke}"/>
  <rect x="56" y="16" width="8"  height="8" fill="{fill_lo}"/>
  <rect x="64" y="16" width="8"  height="8" fill="{stroke}"/>
  <rect x="72" y="16" width="8"  height="8" fill="{fill_lo}"/>
  <!-- Row 3: crown band upper interior -->
  <rect x="0"  y="24" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="24" width="32" height="8" fill="{fill_hi}"/>
  <rect x="40" y="24" width="32" height="8" fill="{fill_lo}"/>
  <rect x="72" y="24" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 4: crown band lower interior -->
  <rect x="0"  y="32" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="32" width="24" height="8" fill="{fill_hi}"/>
  <rect x="32" y="32" width="16" height="8" fill="{fill}"/>
  <rect x="48" y="32" width="24" height="8" fill="{fill_lo}"/>
  <rect x="72" y="32" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 5: collar (cols 1-8) -->
  <rect x="8"  y="40" width="64" height="8" fill="{stroke}"/>
  <!-- Row 6: collar (cols 1-8) -->
  <rect x="8"  y="48" width="64" height="8" fill="{stroke}"/>
  <!-- Row 7: narrow base top (cols 2-7) -->
  <rect x="16" y="56" width="48" height="8" fill="{stroke}"/>
  <!-- Row 8: base -->
  <rect x="0"  y="64" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="64" width="16" height="8" fill="{fill_hi}"/>
  <rect x="24" y="64" width="24" height="8" fill="{fill}"/>
  <rect x="48" y="64" width="24" height="8" fill="{fill_lo}"/>
  <rect x="72" y="64" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 9: base bottom outline -->
  <rect x="0"  y="72" width="80" height="8" fill="{stroke}"/>
</svg>
