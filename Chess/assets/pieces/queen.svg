<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Pixel art queen: 10x10 block grid, 8 units per block, rects only    -->
  <!-- 3 crown orbs (2px each) with accent gems, connecting band, body, base -->

  <!-- Row 0: three crown orb outlines (2px each at cols 1-2, 4-5, 7-8) -->
  <rect x="8"  y="0"  width="16" height="8" fill="{stroke}"/>
  <rect x="32" y="0"  width="16" height="8" fill="{stroke}"/>
  <rect x="56" y="0"  width="16" height="8" fill="{stroke}"/>
  <!-- Row 1: orb interiors with accent gems -->
  <rect x="8"  y="8"  width="8"  height="8" fill="{stroke}"/>
  <rect x="16" y="8"  width="8"  height="8" fill="{accent}"/>
  <rect x="32" y="8"  width="8"  height="8" fill="{stroke}"/>
  <rect x="40" y="8"  width="8"  height="8" fill="{accent}"/>
  <rect x="56" y="8"  width="8"  height="8" fill="{stroke}"/>
  <rect x="64" y="8"  width="8"  height="8" fill="{accent}"/>
  <!-- Row 2: crown connecting band (cols 1-8) -->
  <rect x="8"  y="16" width="64" height="8" fill="{stroke}"/>
  <!-- Row 3: crown body upper -->
  <rect x="0"  y="24" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="24" width="16" height="8" fill="{fill_hi}"/>
  <rect x="24" y="24" width="32" height="8" fill="{fill}"/>
  <rect x="56" y="24" width="16" height="8" fill="{fill_lo}"/>
  <rect x="72" y="24" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 4: crown body -->
  <rect x="0"  y="32" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="32" width="16" height="8" fill="{fill_hi}"/>
  <rect x="24" y="32" width="32" height="8" fill="{fill}"/>
  <rect x="56" y="32" width="16" height="8" fill="{fill_lo}"/>
  <rect x="72" y="32" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 5: crown body lower -->
  <rect x="0"  y="40" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="40" width="8"  height="8" fill="{fill_hi}"/>
  <rect x="16" y="40" width="40" height="8" fill="{fill}"/>
  <rect x="56" y="40" width="16" height="8" fill="{fill_lo}"/>
  <rect x="72" y="40" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 6: crown body base -->
  <rect x="0"  y="48" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="48" width="8"  height="8" fill="{fill_hi}"/>
  <rect x="16" y="48" width="40" height="8" fill="{fill}"/>
  <rect x="56" y="48" width="16" height="8" fill="{fill_lo}"/>
  <rect x="72" y="48" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 7: collar (cols 1-8) -->
  <rect x="8"  y="56" width="64" height="8" fill="{stroke}"/>
  <!-- Row 8: base -->
  <rect x="0"  y="64" width="8"  height="8" fill="{stroke}"/>
  <rect x="8"  y="64" width="16" height="8" fill="{fill_hi}"/>
  <rect x="24" y="64" width="24" height="8" fill="{fill}"/>
  <rect x="48" y="64" width="24" height="8" fill="{fill_lo}"/>
  <rect x="72" y="64" width="8"  height="8" fill="{stroke}"/>
  <!-- Row 9: base bottom -->
  <rect x="0"  y="72" width="80" height="8" fill="{stroke}"/>
</svg>
