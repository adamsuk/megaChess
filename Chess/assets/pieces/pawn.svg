<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!--
    Pixel art pawn: drop shadow, raised base, collar, tapering body, round head with shine.
    Uses {fill} (base), {fill_hi} (highlight), {fill_lo} (shadow), {stroke} (outline), {accent}.
  -->
  <!-- Drop shadow -->
  <rect x="14" y="70" width="52" height="6" rx="1" fill="{fill_lo}"/>
  <!-- Base platform -->
  <rect x="8"  y="63" width="64" height="11" rx="1" fill="{fill}" stroke="{stroke}" stroke-width="2"/>
  <!-- Base top highlight strip -->
  <rect x="9"  y="64" width="62" height="3" fill="{fill_hi}"/>
  <!-- Base right shadow strip -->
  <rect x="67" y="64" width="3"  height="8" fill="{fill_lo}"/>
  <!-- Collar -->
  <rect x="22" y="56" width="36" height="8" rx="1" fill="{fill}" stroke="{stroke}" stroke-width="2"/>
  <!-- Collar top highlight -->
  <rect x="23" y="57" width="34" height="2" fill="{fill_hi}"/>
  <!-- Body (narrowing upward) -->
  <polygon points="30,38 50,38 46,56 34,56" fill="{fill}" stroke="{stroke}" stroke-width="2"/>
  <!-- Body left-face highlight -->
  <polygon points="30,38 34,38 32,56 30,56" fill="{fill_hi}"/>
  <!-- Head circle (main) -->
  <circle cx="40" cy="26" r="17" fill="{fill}" stroke="{stroke}" stroke-width="2"/>
  <!-- Head shine (top-left) -->
  <circle cx="33" cy="20" r="8"  fill="{fill_hi}"/>
</svg>
